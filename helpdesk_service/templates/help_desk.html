<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Discussion</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>Forum Discussion</h1>

    <div id="threads">
        <h2>Threads</h2>
        <ul id="thread-list"></ul>
        <input type="text" id="new-thread-title" placeholder="New thread title">
        <button onclick="addThread()">Add Thread</button>
    </div>

    <div id="comments" style="display: none;">
        <h2 id="selected-thread-title"></h2>
        <ul id="comment-list"></ul>
        <input type="text" id="comment-text" placeholder="Your comment">
        <button onclick="addComment()">Add Comment</button>
        <button onclick="goBack()">Back</button>
    </div>

    <script src="/static/forum.js"></script>
</body>
</html>
